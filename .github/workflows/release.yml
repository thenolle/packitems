name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Extract version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download and install TextAPI locally
        run: |
          curl -L https://github.com/thenolle/textapi/releases/download/v1.0.6/textapi-1.0.6.jar \
            -o textapi.jar
          mvn install:install-file \
            -Dfile=textapi.jar \
            -DgroupId=com.nolly.mc \
            -DartifactId=textapi \
            -Dversion=1.0.6 \
            -Dpackaging=jar

      - name: Build JAR
        run: mvn -B clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: PackItems v${{ steps.version.outputs.VERSION }}
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
